model:
  name: catboost
  enabled: true
  params:
    iterations: 1000
    learning_rate: 0.03
    depth: 5
    loss_function: Logloss
    eval_metric: PRAUC
    auto_class_weights: Balanced
    verbose: false
    allow_writing_files: false
  search:
    enabled: false
    scoring: average_precision
    cv: 3
    n_iter: 12
    param_distributions:
      depth: [3, 4, 5, 6]
      learning_rate: [0.01, 0.02, 0.03, 0.05]
      l2_leaf_reg: [1, 3, 5, 10]
      iterations: [500, 1000]
