model:
  name: xgboost
  enabled: true
  params:
    n_estimators: 1000
    learning_rate: 0.03
    max_depth: 3
    min_child_weight: 3
    subsample: 0.8
    colsample_bytree: 0.8
    reg_alpha: 0.0
    reg_lambda: 5.0
    gamma: 0.0
    objective: binary:logistic
    eval_metric: aucpr
    tree_method: hist
    early_stopping_rounds: 50
    n_jobs: -1
  search:
    enabled: false
    scoring: average_precision
    cv: 3
    n_iter: 20
    param_distributions:
      max_depth: [2, 3, 4, 5, 6]
      min_child_weight: [1, 3, 5, 10]
      learning_rate: [0.01, 0.02, 0.03, 0.05, 0.08]
      subsample: [0.6, 0.75, 0.9, 1.0]
      colsample_bytree: [0.5, 0.7, 0.9, 1.0]
      reg_alpha: [0, 0.1, 1, 5]
      reg_lambda: [1, 3, 5, 10]
      gamma: [0, 0.5, 1, 5]
